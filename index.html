<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KantinPintar - Kasir Mini</title>
    
    <!-- PUSTAKA VUE 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; background-color: #ffffff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; margin-top: 20px; }
        .form-panel { background-color: #ffffff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: fit-content; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; }
        .btn-simpan { width: 100%; padding: 10px; background-color: #2ecc71; color: #ffffff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .etalase-panel { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card-menu { background-color: #ffffff; border-radius: 10px; overflow: hidden; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-menu img { width: 100%; height: 140px; object-fit: cover; }
        .card-info { padding: 15px; }
        .harga { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <header>
            <h1>🏪 KantinPintar - Kasir Mini</h1>
            <p>Tahap 2: Menampilkan Menu Dinamis dengan Vue 3</p>
        </header>

        <div class="main-layout">
            <!-- PANEL FORM INPUT -->
            <div class="form-panel">
                <h3>➕ Tambah Menu Baru</h3>
                <div class="form-group">
                    <label>Nama Makanan</label>
                    <input type="text" placeholder="Contoh: Bakso">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" placeholder="Contoh: 10000">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select>
                        <option value="Tersedia">Tersedia</option>
                        <option value="Habis">Habis</option>
                    </select>
                </div>
                <button class="btn-simpan">Simpan ke Menu</button>
            </div>

            <!-- PANEL ETALASE DINAMIS -->
            <div class="etalase-panel">
                <div class="card-menu" v-for="produk in daftarProduk" :key="produk.id">
                    <img :src="produk.gambar" :alt="produk.nama">
                    <div class="card-info">
                        <h3>{{ produk.nama }}</h3>
                        <div class="harga">Rp {{ produk.harga }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SKRIP VUE 3 -->
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    daftarProduk: [
                        {
                            id: 1,
                            nama: "Nasi Pecel Madiun",
                            harga: 12000,
                            gambar: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400",
                            status: "Tersedia"
                        },
                        {
                            id: 2,
                            nama: "Es Teh Manis",
                            harga: 3000,
                            gambar: "https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=400",
                            status: "Habis"
                        }
                    ]
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
