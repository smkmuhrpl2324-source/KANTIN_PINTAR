<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KantinPintar - Kasir Mini</title>

    <!-- MEMANGGIL PUSTAKA VUE 3 VIA CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- BAGIAN CSS: Mengatur tata letak dan keindahan halaman web -->
    <style>
        /* Mengatur tampilan font dasar dan warna latar belakang halaman */
        body { 
            font-family: sans-serif; 
            background-color: #f4f6f9; 
            padding: 20px; 
            margin: 0;
        }
        
        /* Mengatur lebar maksimal halaman agar konten berada di tengah layar */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
        }
        
        /* Mengatur kotak judul atas (Header) */
        header { 
            text-align: center; 
            background-color: #ffffff; 
            padding: 15px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        /* Mengatur tata letak utama menjadi 2 kolom menggunakan CSS Grid */
        /* Kolom kiri berukuran 350px (Form), kolom kanan menghabiskan sisa layar (Etalase) */
        .main-layout { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 20px; 
            margin-top: 20px; 
        }
        
        /* Mengatur kotak panel input di sebelah kiri */
        .form-panel { 
            background-color: #ffffff; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content; 
        }
        
        /* Memberikan jarak antar-kelompok input */
        .form-group { 
            margin-bottom: 15px; 
        }
        
        /* Mengatur teks label petunjuk di atas kotak input */
        .form-group label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }
        
        /* Mengatur ukuran kotak input teks, angka, dan pilihan */
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #cccccc; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        
        /* Mengatur tampilan tombol simpan menjadi berwarna hijau */
        .btn-simpan { 
            width: 100%; 
            padding: 10px; 
            background-color: #2ecc71; 
            color: #ffffff; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        
        /* Mengatur area etalase di sebelah kanan agar kartu produk otomatis berbaris rapi */
        .etalase-panel { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
        }
        
        /* Mengatur kotak pembungkus untuk satu kartu produk makanan */
        .card-menu { 
            background-color: #ffffff; 
            border-radius: 10px; 
            overflow: hidden; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        
        /* Mengatur ukuran gambar produk di dalam kartu */
        .card-menu img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
        }
        
        /* Memberikan jarak bagian dalam untuk teks info produk */
        .card-info { 
            padding: 15px; 
        }
        
        /* Mengatur teks harga menjadi berwarna oranye dan tebal */
        .harga { 
            color: #e67e22; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <!-- Bagian Kepala Halaman Web -->
        <header>
            <h1>KantinPintar - Kasir Mini</h1>
            <p>Tahap 2: Menampilkan Menu Dinamis dengan Vue 3</p>
        </header>

        <!-- Area Tata Letak Utama -->
        <div class="main-layout">
            
            <!-- PANEL SEBELAH KIRI: FORM INPUT DATA BARU -->
            <div class="form-panel">
                <h3>Tambah Menu Baru</h3>
                <div class="form-group">
                    <label>Nama Makanan</label>
                    <input type="text" placeholder="Contoh: Bakso">
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" placeholder="Contoh: 10000">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select>
                        <option value="Tersedia">Tersedia</option>
                        <option value="Habis">Habis</option>
                    </select>
                </div>
                <button class="btn-simpan">Simpan ke Menu</button>
            </div>

           <!-- PANEL ETALASE PRODUK -->
<div class="etalase-panel">
    
    <!-- v-for akan menduplikasi div ini otomatis sesuai jumlah item di daftarProduk -->
    <div class="card-menu" v-for="produk in daftarProduk" :key="produk.id">
        <!-- Binding atribut gambar dengan tanda titik dua (:) -->
        <img :src="produk.gambar" :alt="produk.nama">
        
        <div class="card-info">
            <!-- Interpolation {{ }} untuk menampilkan teks nama & harga -->
            <h3>{{ produk.nama }}</h3>
            <div class="harga">Rp {{ produk.harga }}</div>
        </div>
    </div>

</div>
            
        </div>

    </div>
</body>
<!-- SKRIP VUE 3: OTAK PENGELOLA DATA -->
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    // Data menu makanan yang tersimpan dalam bentuk Array
                    daftarProduk: [
                        {
                            id: 1,
                            nama: "Nasi Pecel Madiun",
                            harga: 12000,
                            gambar: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400",
                            status: "Tersedia"
                        },
                        {
                            id: 2,
                            nama: "Es Teh Manis",
                            harga: 3000,
                            gambar: "https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=400",
                            status: "Habis"
                        }
                    ]
                }
            }
        }).mount('#app'); // Mengikat Vue ke elemen dengan id="app"
    </script>
</body>
</html>
